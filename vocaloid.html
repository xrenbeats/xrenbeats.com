*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--white);
  font-family: var(--font-ui);
  overflow-x: hidden;
  min-height: 100vh;
  position: relative;
}

/* ── RAIN CANVAS ── */
#rain-canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  opacity: 0.35;
}

/* ── BG GLOW ── */
.bg-glow {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background:
    radial-gradient(ellipse 55% 45% at 20% 60%, rgba(125,212,252,0.07) 0%, transparent 65%),
    radial-gradient(ellipse 45% 55% at 80% 30%, rgba(240,171,252,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 50% 90%, rgba(94,234,212,0.05) 0%, transparent 70%);
}

/* ── WRAPPER ── */
.wrapper {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 3rem 1.5rem;
  gap: 0;
}

/* ── BACK LINK ── */
.back-link {
  position: fixed;
  top: 1.5rem; left: 1.5rem;
  font-family: var(--font-mono);
  font-size: 0.62rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  transition: color 0.2s;
  z-index: 10;
}

.back-link:hover { color: var(--cyan); }

/* ── HEADER ── */
.page-header {
  text-align: center;
  margin-bottom: 2.5rem;
  opacity: 0;
  animation: fadeDown 1s 0.2s forwards;
}

.vocaloid-tag {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--cyan);
  margin-bottom: 0.75rem;
  display: block;
}

.song-title-jp {
  font-family: var(--font-jp);
  font-size: clamp(1rem, 3vw, 1.3rem);
  font-weight: 300;
  color: var(--muted);
  letter-spacing: 0.3em;
  display: block;
  margin-bottom: 0.4rem;
}

.song-title-en {
  font-family: var(--font-jp);
  font-size: clamp(3.5rem, 10vw, 6.5rem);
  font-weight: 700;
  line-height: 1;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, var(--white) 0%, var(--cyan) 60%, var(--pink) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  display: block;
}

.song-subtitle {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  color: var(--muted);
  letter-spacing: 0.2em;
  margin-top: 0.75rem;
  text-transform: uppercase;
}

/* ── PLAYER CARD ── */
.player-card {
  width: 100%;
  max-width: 480px;
  background: var(--surface);
  border: 1px solid var(--border);
  backdrop-filter: blur(20px);
  padding: 2rem;
  position: relative;
  overflow: hidden;
  opacity: 0;
  animation: fadeUp 1s 0.5s forwards;
}

.player-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--cyan), var(--pink), transparent);
}

/* waveform visualizer bars */
.visualizer {
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 3px;
  height: 48px;
  margin-bottom: 1.5rem;
}

.viz-bar {
  width: 3px;
  background: var(--cyan);
  border-radius: 2px;
  opacity: 0.5;
  transition: height 0.1s;
  animation: vizIdle var(--spd) ease-in-out infinite alternate;
}

.viz-bar:nth-child(odd)  { background: var(--pink); }
.viz-bar:nth-child(3n)   { background: var(--teal); }

@keyframes vizIdle {
  from { height: 4px; opacity: 0.3; }
  to   { height: var(--h); opacity: 0.7; }
}

/* ── TRACK INFO ── */
.track-info {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.25rem;
}

.track-name {
  font-family: var(--font-jp);
  font-size: 1.1rem;
  font-weight: 400;
  letter-spacing: 0.05em;
}

.track-type {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  background: rgba(125,212,252,0.08);
  border: 1px solid rgba(125,212,252,0.15);
  padding: 0.25rem 0.6rem;
}

/* ── PROGRESS ── */
.progress-wrap {
  position: relative;
  height: 3px;
  background: rgba(255,255,255,0.07);
  margin-bottom: 0.5rem;
  cursor: pointer;
  border-radius: 2px;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--cyan), var(--pink));
  border-radius: 2px;
  width: 0%;
  transition: width 0.1s linear;
  pointer-events: none;
}

.progress-dot {
  position: absolute;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--white);
  left: 0%;
  transition: left 0.1s linear;
  pointer-events: none;
  box-shadow: 0 0 6px var(--cyan);
}

.time-row {
  display: flex;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--muted);
  margin-bottom: 1.5rem;
  letter-spacing: 0.08em;
}

/* ── CONTROLS ── */
.controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1.25rem;
}

.ctrl-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--muted);
  transition: color 0.2s, transform 0.15s;
  padding: 0.25rem;
  display: flex;
  align-items: center;
  justify-content: center;
}

.ctrl-btn:hover { color: var(--cyan); transform: scale(1.1); }

.play-btn {
  width: 52px; height: 52px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: rgba(125,212,252,0.08);
  color: var(--white);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
  box-shadow: 0 0 0 0 rgba(125,212,252,0.3);
}

.play-btn:hover {
  background: rgba(125,212,252,0.18);
  box-shadow: 0 0 20px rgba(125,212,252,0.25);
  transform: scale(1.05);
}

.play-btn.playing {
  border-color: var(--cyan);
  background: rgba(125,212,252,0.12);
  box-shadow: 0 0 24px rgba(125,212,252,0.3);
}

/* ── VOLUME ── */
.volume-row {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-top: 1.25rem;
  padding-top: 1.25rem;
  border-top: 1px solid var(--border);
}

.vol-icon { color: var(--muted); flex-shrink: 0; }

input[type=range] {
  -webkit-appearance: none;
  flex: 1;
  height: 2px;
  background: rgba(255,255,255,0.1);
  border-radius: 2px;
  cursor: pointer;
  outline: none;
}

input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--cyan);
  cursor: pointer;
  box-shadow: 0 0 6px var(--cyan);
}

/* ── VOCALOIDS ── */
.vocaloids {
  width: 100%;
  max-width: 480px;
  margin-top: 1.25rem;
  opacity: 0;
  animation: fadeUp 1s 0.8s forwards;
}

.vocaloids-label {
  font-family: var(--font-mono);
  font-size: 0.58rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.75rem;
  text-align: center;
}

.vocaloid-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  justify-content: center;
}

.chip {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  letter-spacing: 0.1em;
  padding: 0.35rem 0.85rem;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  border-radius: 999px;
  white-space: nowrap;
  transition: border-color 0.2s, color 0.2s;
}

.chip.flower  { --c: #f0abfc; }
.chip.miku    { --c: #5eead4; }
.chip.yuki    { --c: #bae6fd; }
.chip.yukari  { --c: #c4b5fd; }

.chip:hover { border-color: var(--c); color: var(--c); }

/* ── FOOTER NOTE ── */
.foot-note {
  margin-top: 2.5rem;
  font-family: var(--font-mono);
  font-size: 0.58rem;
  letter-spacing: 0.12em;
  color: rgba(180,200,255,0.2);
  text-transform: uppercase;
  text-align: center;
  opacity: 0;
  animation: fadeUp 1s 1.1s forwards;
}

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── PLAYING STATE: active visualizer ── */
body.is-playing .viz-bar {
  animation-duration: var(--spd);
  opacity: 0.9;
}

  </div>

  <script>
    // ─────────────────────────────────────────────────────────────────
    // [help] — AUDIO FILE PATH
    // Replace the string below with the path to your rain vocals file
    // in your GitHub repo. Example: if your file is at /audio/rain.mp3
    // then set it to: './audio/rain.mp3'
    // Supported formats: .mp3  .ogg  .wav  .flac
    // ─────────────────────────────────────────────────────────────────
    const AUDIO_SRC = './play/rain-vocaloid-song.mp3'; // ← [help] Change this to your file path

    // ── AUDIO SETUP ──────────────────────────────────────────────────
    const audio = new Audio(AUDIO_SRC);
    audio.volume = 0.8;
    let looping = false;
      
(function() {
    const sequence = ['x', 'r', 'e', 'n'];
    let currentIndex = 0;
    let lastKeyTime = 0;
    
    // This is the variable you want to toggle
    window.looping = false;

    window.addEventListener('keydown', (event) => {
        const currentTime = Date.now();
        const key = event.key.toLowerCase();

        // 1. Check if the delay between keys is longer than 3.451 seconds
        if (currentIndex > 0 && (currentTime - lastKeyTime) > 3451) {
            currentIndex = 0; // Reset if too slow
        }

        // 2. Check if the pressed key matches the next step in "xren"
        if (key === sequence[currentIndex]) {
            currentIndex++;
            lastKeyTime = currentTime;

            // 3. If the full sequence is complete
            if (currentIndex === sequence.length) {
                window.looping = true;
                currentIndex = 0; // Reset for next time
                // No console.log or alert ensures the user is never told
            }
        } else {
            // If the wrong key is pressed, reset the sequence
            // Exception: if they press 'x' again, treat it as the new start
            currentIndex = (key === 'x') ? 1 : 0;
            lastKeyTime = currentTime;
        }
    });
})();


    // ── ELEMENTS ─────────────────────────────────────────────────────
    const btnPlay      = document.getElementById('btn-play');
    const btnRestart   = document.getElementById('btn-restart');
    const btnLoop      = document.getElementById('btn-loop');
    const iconPlay     = document.getElementById('icon-play');
    const iconPause    = document.getElementById('icon-pause');
    const progressFill = document.getElementById('progress-fill');
    const progressDot  = document.getElementById('progress-dot');
    const progressWrap = document.getElementById('progress-wrap');
    const timeCur      = document.getElementById('time-cur');
    const timeTot      = document.getElementById('time-tot');
    const volumeInput  = document.getElementById('volume');

    function fmt(s) {
      if (isNaN(s)) return '0:00';
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return `${m}:${sec.toString().padStart(2,'0')}`;
    }

    // Play / Pause
    btnPlay.addEventListener('click', () => {
      if (audio.paused) {
        audio.play();
        iconPlay.style.display  = 'none';
        iconPause.style.display = 'block';
        btnPlay.classList.add('playing');
        document.body.classList.add('is-playing');
      } else {
        audio.pause();
        iconPlay.style.display  = 'block';
        iconPause.style.display = 'none';
        btnPlay.classList.remove('playing');
        document.body.classList.remove('is-playing');
      }
    });

    // Restart
    btnRestart.addEventListener('click', () => {
      audio.currentTime = 0;
      if (audio.paused) {
        audio.play();
        iconPlay.style.display  = 'none';
        iconPause.style.display = 'block';
        btnPlay.classList.add('playing');
        document.body.classList.add('is-playing');
      }
    });

    // Loop toggle
    btnLoop.addEventListener('click', () => {
      looping = !looping;
      audio.loop = looping;
      btnLoop.style.color = looping ? 'var(--cyan)' : '';
    });

    // Progress update
    audio.addEventListener('timeupdate', () => {
      if (!audio.duration) return;
      const pct = (audio.currentTime / audio.duration) * 100;
      progressFill.style.width = pct + '%';
      progressDot.style.left   = pct + '%';
      timeCur.textContent = fmt(audio.currentTime);
      timeTot.textContent = fmt(audio.duration);
    });

    // Seek on click
    progressWrap.addEventListener('click', (e) => {
      const rect = progressWrap.getBoundingClientRect();
      const pct  = (e.clientX - rect.left) / rect.width;
      audio.currentTime = pct * audio.duration;
    });

    // Volume
    volumeInput.addEventListener('input', () => {
      audio.volume = volumeInput.value;
    });

    // End
    audio.addEventListener('ended', () => {
      if (!looping) {
        iconPlay.style.display  = 'block';
        iconPause.style.display = 'none';
        btnPlay.classList.remove('playing');
        document.body.classList.remove('is-playing');
      }
    });

    // ── VISUALIZER BARS ───────────────────────────────────────────────
    const vizEl   = document.getElementById('visualizer');
    const BAR_COUNT = 32;
    const bars = [];

    for (let i = 0; i < BAR_COUNT; i++) {
      const b = document.createElement('div');
      b.className = 'viz-bar';
      const h   = 6 + Math.random() * 34;
      const spd = (0.4 + Math.random() * 0.8).toFixed(2);
      b.style.setProperty('--h', h + 'px');
      b.style.setProperty('--spd', spd + 's');
      b.style.height = '4px';
      vizEl.appendChild(b);
      bars.push(b);
    }

    // Animate bars while playing (CSS handles idle; JS handles active)
    function animateBars() {
      if (!audio.paused) {
        bars.forEach(b => {
          const h = 4 + Math.random() * 42;
          b.style.height = h + 'px';
        });
      }
      requestAnimationFrame(animateBars);
    }

    animateBars();

    // ── RAIN CANVAS ───────────────────────────────────────────────────
    const canvas = document.getElementById('rain-canvas');
    const ctx    = canvas.getContext('2d');

    let drops = [];

    function resizeCanvas() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      drops = [];
      for (let i = 0; i < 120; i++) {
        drops.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          len: 10 + Math.random() * 20,
          speed: 2 + Math.random() * 3,
          opacity: 0.15 + Math.random() * 0.4,
          width: 0.5 + Math.random() * 0.8,
        });
      }
    }

    function drawRain() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drops.forEach(d => {
        ctx.beginPath();
        ctx.moveTo(d.x, d.y);
        ctx.lineTo(d.x - 1, d.y + d.len);
        ctx.strokeStyle = `rgba(125, 212, 252, ${d.opacity})`;
        ctx.lineWidth = d.width;
        ctx.stroke();
        d.y += d.speed;
        if (d.y > canvas.height) {
          d.y = -d.len;
          d.x = Math.random() * canvas.width;
        }
      });
      requestAnimationFrame(drawRain);
    }

    resizeCanvas();
    drawRain();
    window.addEventListener('resize', resizeCanvas);
  </script>
